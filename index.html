<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix 狀態同步器</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#141414">
    <style>
        body {
            background-color: #141414;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .status-container {
            text-align: center;
            margin-bottom: 40px;
        }
        .status-dot {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            background-color: #46d369;
            box-shadow: 0 0 20px #46d369;
            transition: all 0.3s ease;
        }
        .status-dot.busy {
            background-color: #e50914;
            box-shadow: 0 0 20px #e50914;
        }
        .status-text {
            font-size: 24px;
            font-weight: bold;
        }
        .btn {
            background-color: #ffffff;
            color: #141414;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="status-container">
        <div id="statusDot" class="status-dot"></div>
        <div id="statusText" class="status-text">目前沒人使用，衝啊！</div>
    </div>

    <button id="toggleBtn" class="btn">我要開始看 Netflix</button>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        // 註冊 PWA Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker 註冊成功！'))
                .catch(err => console.log('註冊失敗：', err));
        }

        // 貼上你截圖中的 Firebase 設定（已手動補上 databaseURL）
        const firebaseConfig = {
            apiKey: "AIzaSyAAYQduNLkf_27N7Q97fyVRrK7KEZEq-i4",
            authDomain: "netflix-status-73cbc.firebaseapp.com",
            databaseURL: "https://netflix-status-73cbc-default-rtdb.firebaseio.com",
            projectId: "netflix-status-73cbc",
            storageBucket: "netflix-status-73cbc.firebasestorage.app",
            messagingSenderId: "125309083411",
            appId: "1:125309083411:web:e358f870ddba159c1444e6"
        };

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const netflixStatusRef = database.ref('netflix/isUsing');

        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const toggleBtn = document.getElementById('toggleBtn');
        
        let currentStatus = false;

        // 監聽雲端資料庫變動
        netflixStatusRef.on('value', (snapshot) => {
            currentStatus = snapshot.val() || false;
            updateUI(currentStatus);
        });

        function updateUI(isUsing) {
            if (isUsing) {
                statusDot.classList.add('busy');
                statusText.innerText = '有人正在看，先等等！';
                toggleBtn.innerText = '我看完了（釋放帳號）';
                toggleBtn.style.backgroundColor = '#e50914';
                toggleBtn.style.color = 'white';
            } else {
                statusDot.classList.remove('busy');
                statusText.innerText = '目前沒人使用，衝啊！';
                toggleBtn.innerText = '我要開始看 Netflix';
                toggleBtn.style.backgroundColor = '#ffffff';
                toggleBtn.style.color = '#141414';
            }
        }

        // 點擊修改雲端狀態
        toggleBtn.addEventListener('click', () => {
            netflixStatusRef.set(!currentStatus);
        });
    </script>
</body>
</html>
